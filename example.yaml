# Example: Feit Electric LEDR6/RGBW/AG with CBU (BK7231N) module
# Cloud-cut via tuya-cloudcutter, then flash this config via ESPHome

substitutions:
  device_name: my-downlight
  friendly_name: "My Downlight"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

external_components:
  - source:
      type: git
      url: https://github.com/trbom5c/esphome-bp5926
    components: [bp5926]

bk72xx:
  board: cbu

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name}-fallback"
    password: !secret fallback_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  baud_rate: 0

web_server:
  port: 80

output:
  - platform: libretiny_pwm
    id: output_red
    pin: P26
    frequency: 3000 Hz

  - platform: libretiny_pwm
    id: output_green
    pin: P24
    frequency: 3000 Hz

  - platform: libretiny_pwm
    id: output_blue
    pin: P6
    frequency: 3000 Hz

  - platform: libretiny_pwm
    id: output_white_power
    pin: P8
    frequency: 3000 Hz

  - platform: libretiny_pwm
    id: output_color_temp_ratio
    pin: P7
    frequency: 3000 Hz

light:
  - platform: bp5926
    name: "Light"
    id: main_light
    red: output_red
    green: output_green
    blue: output_blue
    white_power: output_white_power
    color_temp_ratio: output_color_temp_ratio
    restore_mode: RESTORE_DEFAULT_ON
